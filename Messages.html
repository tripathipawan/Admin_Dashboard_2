<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Messages — AdminDash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="main-wrapper" class="flex flex-col flex-1 overflow-hidden" style="background:var(--bg)">
    <main class="flex-1 overflow-y-auto p-4 sm:p-6">
      <div class="mb-6 anim-up">
        <div class="flex items-center gap-2 text-xs mb-2" style="color:var(--muted2)"><span>Home</span><span
            style="color:var(--border2)">›</span><span style="color:var(--text)">Messages</span></div>
        <h1 class="text-2xl font-extrabold tracking-tight" style="font-family:var(--font-display);color:var(--text)">
          Messages</h1>
        <p class="text-sm mt-1" style="color:var(--muted)">5 unread conversations</p>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-[280px_1fr] gap-4 mb-4"
        style="height:calc(100vh - 220px);min-height:500px">
        <!-- Sidebar list -->
        <div class="panel flex flex-col overflow-hidden">
          <div class="p-3 border-b flex-shrink-0" style="border-color:var(--border)"><input class="inp"
              style="padding:7px 12px;font-size:12px" placeholder="🔍 Search conversations..." /></div>
          <div class="flex-1 overflow-y-auto" id="convList"></div>
        </div>
        <!-- Chat area -->
        <div class="panel flex flex-col overflow-hidden">
          <div class="panel-hd flex-shrink-0">
            <div class="flex items-center gap-3">
              <div id="chatAv"
                class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm text-white"
                style="background:#3b82f6">AK</div>
              <div>
                <div id="chatName" class="font-semibold text-[13px]" style="color:var(--text)">Alex Kim</div>
                <div class="text-[11px] font-semibold text-green-400">● Online</div>
              </div>
            </div>
            <div class="flex gap-2">
              <button
                class="w-9 h-9 rounded-lg flex items-center justify-center border border-[var(--border)] bg-[var(--surface2)] text-[var(--muted)] hover:bg-[var(--surface3)] transition-colors"
                onclick="showToast('Call started! 📞')"><svg width="14" height="14" fill="none" stroke="currentColor"
                  stroke-width="1.9" viewBox="0 0 24 24">
                  <path
                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.47 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.81a16 16 0 0 0 6.29 6.29l.95-.94a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                </svg></button>
              <button
                class="w-9 h-9 rounded-lg flex items-center justify-center border border-[var(--border)] bg-[var(--surface2)] text-[var(--muted)] hover:bg-[var(--surface3)] transition-colors"
                onclick="showToast('Video call! 📹')"><svg width="14" height="14" fill="none" stroke="currentColor"
                  stroke-width="1.9" viewBox="0 0 24 24">
                  <polygon points="23 7 16 12 23 17 23 7" />
                  <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                </svg></button>
            </div>
          </div>
          <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-3" id="msgBody"></div>
          <div class="p-3 border-t flex gap-2 items-end flex-shrink-0" style="border-color:var(--border)">
            <button
              class="w-9 h-9 rounded-lg flex items-center justify-center border border-[var(--border)] bg-[var(--surface2)] flex-shrink-0"
              onclick="showToast('Emoji! 😊')">😊</button>
            <textarea id="msgInput" rows="1" placeholder="Type a message..."
              class="flex-1 rounded-xl px-4 py-2.5 text-sm resize-none outline-none border"
              style="background:var(--surface2);border-color:var(--border2);color:var(--text);min-height:42px;max-height:120px"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
            <button class="btn btn-primary flex-shrink-0" style="height:42px;padding:0 16px" onclick="sendMsg()">Send
              ↗</button>
          </div>
        </div>
      </div>

      <div class="flex justify-between items-center flex-wrap gap-2 pt-4 mt-4 border-t"
        style="border-color:var(--border)">
        <span class="text-xs" style="color:var(--muted2)">© 2025 AdminDash — Made with ❤️ by Pawan Tripathi</span>
        <span class="text-xs" style="color:var(--muted2)">v2.5.0 · <span style="color:var(--green)">● All systems
            operational</span></span>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
  <script>
    initLayout('messages');

    const CONVS = [
      { n: 'Alex Kim', av: 'AK', col: '#3b82f6', preview: 'Payment confirmed for order #4821', time: '2m', unread: true },
      { n: 'Sarah Connor', av: 'SC', col: '#22c55e', preview: "Can you check my refund status?", time: '15m', unread: true },
      { n: 'Raj Patel', av: 'RP', col: '#a855f7', preview: 'Thanks for the quick response!', time: '1h', unread: false },
      { n: 'Emma Watson', av: 'EW', col: '#f59e0b', preview: "Order #4818 still not shipped?", time: '3h', unread: true },
      { n: 'Chris Evans', av: 'CE', col: '#06b6d4', preview: 'Please update my address', time: 'Yesterday', unread: false },
      { n: 'Priya Singh', av: 'PS', col: '#ec4899', preview: 'How to apply coupon code?', time: 'Yesterday', unread: true },
    ];
    const CHATS = { 'Alex Kim': [{ t: 'r', m: 'Hello! I just placed order #4821. Can you confirm?', time: '10:30 AM' }, { t: 's', m: 'Hi Alex! Yes, your order #4821 has been confirmed. Payment received ✅', time: '10:32 AM' }, { t: 'r', m: 'Amazing! When will it be shipped?', time: '10:33 AM' }, { t: 's', m: "It will be shipped within 24 hours. You'll get a tracking link via email.", time: '10:35 AM' }], 'Sarah Connor': [{ t: 'r', m: 'Hi, I requested a refund for order #4818 last week.', time: '9:00 AM' }, { t: 's', m: 'Hello Sarah! Let me check the refund status for you.', time: '9:05 AM' }, { t: 'r', m: 'Can you check my refund status?', time: '9:15 AM' }] };
    let active = 'Alex Kim';
    function renderConvList() {
      const cl = document.getElementById('convList'); cl.innerHTML = '';
      CONVS.forEach(c => {
        const d = document.createElement('div');
        d.className = 'flex items-center gap-3 px-4 py-3 cursor-pointer transition-colors border-b ' + (c.n === active ? '' : 'hover:bg-white/5');
        d.style.borderColor = 'var(--border)';
        if (c.n === active) d.style.background = 'var(--blue-dim)';
        d.onclick = () => openConv(c);
        d.innerHTML = `<div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center font-bold text-sm text-white" style="background:${c.col}">${c.av}</div><div class="flex-1 min-w-0"><div class="flex items-center justify-between"><span class="text-[13px] font-semibold" style="color:var(--text)">${c.n}</span><span class="text-[10px]" style="color:var(--muted2)">${c.time}</span></div><div class="text-[12px] truncate mt-0.5" style="color:${c.unread ? 'var(--text)' : 'var(--muted2)'};font-weight:${c.unread ? '600' : '400'}">${c.preview}</div></div>${c.unread ? '<div class="w-2 h-2 rounded-full flex-shrink-0 bg-blue-400"></div>' : ''}`;
        cl.appendChild(d);
      });
    }
    function openConv(c) { active = c.n; const cv = CONVS.find(x => x.n === c.n); if (cv) cv.unread = false; document.getElementById('chatAv').textContent = c.av; document.getElementById('chatAv').style.background = c.col; document.getElementById('chatName').textContent = c.n; renderMsgs(c.n); renderConvList(); }
    function renderMsgs(name) {
      const mb = document.getElementById('msgBody'); mb.innerHTML = '';
      const msgs = CHATS[name] || [{ t: 'r', m: "Hello! How can I help you today?", time: 'Just now' }];
      msgs.forEach(m => {
        const d = document.createElement('div'); d.className = 'flex ' + (m.t === 's' ? 'justify-end' : 'justify-start');
        const bg = m.t === 's' ? 'linear-gradient(135deg,#3b82f6,#6366f1)' : 'var(--surface2)';
        const border = m.t === 's' ? 'none' : '1px solid var(--border)';
        const rad = m.t === 's' ? '12px 12px 4px 12px' : '4px 12px 12px 12px';
        d.innerHTML = `<div style="max-width:70%;padding:10px 14px;background:${bg};border:${border};border-radius:${rad};font-size:13px;line-height:1.5;color:${m.t === 's' ? '#fff' : 'var(--text)'}"><div>${m.m}</div><div style="font-size:10px;margin-top:4px;opacity:.6">${m.time}</div></div>`;
        mb.appendChild(d);
      });
      mb.scrollTop = mb.scrollHeight;
    }
    function sendMsg() {
      const inp = document.getElementById('msgInput'); if (!inp.value.trim()) return;
      const mb = document.getElementById('msgBody');
      const d = document.createElement('div'); d.className = 'flex justify-end';
      d.innerHTML = `<div style="max-width:70%;padding:10px 14px;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:12px 12px 4px 12px;font-size:13px;line-height:1.5;color:#fff"><div>${inp.value}</div><div style="font-size:10px;margin-top:4px;opacity:.6">Just now</div></div>`;
      mb.appendChild(d); inp.value = ''; mb.scrollTop = mb.scrollHeight;
      setTimeout(() => { const r = document.createElement('div'); r.className = 'flex justify-start'; r.innerHTML = `<div style="max-width:70%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:4px 12px 12px 12px;font-size:13px;line-height:1.5;color:var(--text)"><div>Thanks for your message! We'll get back to you shortly. 🙏</div><div style="font-size:10px;margin-top:4px;opacity:.6">Just now</div></div>`; mb.appendChild(r); mb.scrollTop = mb.scrollHeight; }, 1200);
    }
    setTimeout(() => { renderConvList(); renderMsgs('Alex Kim'); }, 1500);

  </script>
</body>

</html>
